<div class="container">
  <h2>Signes Vitaux du Patient</h2>
  
  <!-- Barre d'erreur -->
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <!-- Bouton Ajouter -->
  <button 
    (click)="toggleForm()" 
    class="btn btn-primary mb-3"
    [disabled]="loading">
    {{ showForm ? 'Annuler' : 'Ajouter une Mesure' }}
  </button>

  <!-- Formulaire d'ajout -->
  <form *ngIf="showForm" [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container mb-4">
    <div class="form-group">
      <label>BPM (battements/min)</label>
      <input type="number" formControlName="bpm" class="form-control" placeholder="Ex: 72">
      <small class="form-text text-muted">30-250 bpm</small>
    </div>

    <div class="form-group">
      <label>Tension Artérielle (systolique/diastolique)</label>
      <input type="text" formControlName="blood_pressure" class="form-control" placeholder="Ex: 120/80">
    </div>

    <div class="form-group">
      <label>SpO2 (%)</label>
      <input type="number" formControlName="spo2" class="form-control" placeholder="Ex: 98">
    </div>

    <div class="form-group">
      <label>Température (°C)</label>
      <input type="number" step="0.01" formControlName="temperature" class="form-control" placeholder="Ex: 37.5">
    </div>

    <div class="form-group">
      <label>Notes</label>
      <textarea formControlName="notes" class="form-control" rows="3"></textarea>
    </div>

    <button type="submit" class="btn btn-success" [disabled]="form.invalid">
      Enregistrer
    </button>
  </form>

  <!-- État de chargement -->
  <div *ngIf="loading" class="spinner">
    <p>Chargement...</p>
  </div>

  <!-- Liste des mesures -->
  <div *ngIf="!loading && vitalSigns.length > 0" class="vital-signs-list">
    <h3>Historique des Mesures</h3>
    <div *ngFor="let vs of vitalSigns" class="vital-sign-card" [ngClass]="getStatusColor(vs.bpm)">
      <div class="vital-sign-row">
        <span class="label">BPM:</span>
        <span class="value" [ngClass]="getStatusColor(vs.bpm)">{{ vs.bpm }}</span>
      </div>
      <div class="vital-sign-row">
        <span class="label">Tension:</span>
        <span class="value">{{ vs.blood_pressure }}</span>
      </div>
      <div class="vital-sign-row">
        <span class="label">SpO2:</span>
        <span class="value">{{ vs.spo2 }}%</span>
      </div>
      <div *ngIf="vs.temperature" class="vital-sign-row">
        <span class="label">Température:</span>
        <span class="value">{{ vs.temperature }}°C</span>
      </div>
      <div *ngIf="vs.notes" class="vital-sign-row">
        <span class="label">Notes:</span>
        <span class="value">{{ vs.notes }}</span>
      </div>
      <div class="vital-sign-row date">
        <span>{{ vs.measured_at | date:'short' }}</span>
      </div>
      <button 
        (click)="deleteVitalSign(vs.id)" 
        class="btn btn-sm btn-danger">
        Supprimer
      </button>
    </div>
  </div>

  <!-- Aucune donnée -->
  <div *ngIf="!loading && vitalSigns.length === 0" class="alert alert-info">
    Aucune mesure enregistrée pour ce patient.
  </div>
</div>
